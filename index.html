<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    color: #000;
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none; touch-action: none;
  }

  #canvas-container { position: absolute; inset: 0; z-index: 0; }
  canvas { display: block; touch-action: none; }

  /* ── Toolbar ── */
  .toolbar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; align-items: center; gap: 2px;
    background: #fff; border: 1px solid #000; border-radius: 6px;
    padding: 4px 6px; flex-wrap: wrap; max-width: 96vw; justify-content: center;
  }
  .toolbar button, .toolbar label {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    background: transparent; border: 1px solid transparent; color: #666;
    font-family: inherit; font-size: 10px; font-weight: 500;
    padding: 6px 10px; border-radius: 4px; cursor: pointer;
    transition: all 0.12s; white-space: nowrap;
  }
  .toolbar button:hover { border-color: #ccc; color: #000; }
  .toolbar button:active { transform: scale(0.96); }
  .toolbar button.active { background: #000; color: #fff; border-color: #000; }
  .toolbar button.toggle-on { background: #222; color: #fff; border-color: #222; }
  .toolbar button:disabled { opacity: 0.25; pointer-events: none; }

  .sep { width: 1px; height: 20px; background: #ccc; margin: 0 3px; flex-shrink: 0; }

  /* ── Swatches ── */
  .color-swatch {
    width: 18px; height: 18px; border-radius: 50%;
    border: 1px solid #bbb; cursor: pointer;
    transition: border-color 0.12s, transform 0.12s; flex-shrink: 0;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: #000; border-width: 2px; transform: scale(1.15); }
  .color-swatch.white-swatch { background: #fff !important; border: 1px solid #ccc; }
  .color-swatch.white-swatch.active { border: 2px solid #000; }
  .color-input { width: 0; height: 0; opacity: 0; position: absolute; }

  /* ── Sliders ── */
  input[type="range"] {
    -webkit-appearance: none; width: 70px; height: 3px;
    background: #ccc; border-radius: 2px; outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #000; cursor: pointer;
  }
  .size-label { font-size: 9px; color: #999; min-width: 16px; text-align: center; }

  /* ── Status ── */
  .status { position: absolute; bottom: 12px; left: 12px; z-index: 10; font-size: 9px; color: #aaa; }
  .pen-info { position: absolute; bottom: 12px; right: 12px; z-index: 10; font-size: 9px; color: #aaa; text-align: right; }
  .pen-info .detected { color: #2a9d5c; }

  /* ── Toast ── */
  .toast {
    position: absolute; bottom: 12px; left: 50%;
    transform: translateX(-50%) translateY(50px); z-index: 20;
    background: #000; border: 1px solid #333; padding: 8px 16px;
    border-radius: 6px; font-size: 11px; color: #fff;
    opacity: 0; transition: all 0.25s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Eraser cursor ── */
  #eraser-cursor {
    position: absolute; pointer-events: none; z-index: 5;
    border: 1.5px solid rgba(0,0,0,0.35); border-radius: 50%;
    display: none; transform: translate(-50%, -50%);
  }

  /* ── Symmetry ── */
  #symmetry-overlay { position: absolute; inset: 0; z-index: 4; pointer-events: none; display: none; }
  #symmetry-overlay svg { width: 100%; height: 100%; position: absolute; inset: 0; }
  #symmetry-overlay .sym-line { stroke: rgba(0,0,0,0.25); stroke-width: 1; stroke-dasharray: 6 5; }
  .sym-handle {
    position: absolute; width: 14px; height: 14px; border-radius: 50%;
    background: #000; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    transform: translate(-50%, -50%); cursor: grab; pointer-events: auto; z-index: 6; display: none;
  }
  .sym-handle:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.15); }

  /* ── Export overlay ── */
  #export-overlay {
    display: none; position: absolute; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
    flex-direction: column; gap: 10px;
  }
  #export-overlay .ex-text { color: #fff; font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
  #export-overlay .ex-detail { color: #888; font-family: 'IBM Plex Mono', monospace; font-size: 10px; }
  #export-overlay .bar-track { width: 260px; height: 4px; background: #444; border-radius: 2px; overflow: hidden; }
  #export-overlay .bar-fill { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.1s; }

  svg { display: inline; vertical-align: middle; }
</style>
</head>
<body>

<div class="toolbar">
  <button id="btn-pen" class="active" title="Pen 1-5px (P)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    Pen
  </button>
  <button id="btn-brush" title="Brush 1-20px (B)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.37 2.63a2.12 2.12 0 013 3L14 13l-4 1 1-4z"/><path d="M9 14.5A5.5 5.5 0 003.5 20H2v1h3.5A5.5 5.5 0 009 14.5z"/></svg>
    Brush
  </button>
  <button id="btn-eraser" title="Eraser (E / ~)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l9-9 8 8-4 4z"/><path d="m6.5 17.5 5-5"/></svg>
    Eraser
  </button>
  <button id="btn-lasso" title="Lasso Fill (L)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12c0-4.97 4.03-9 9-9s9 4.03 9 9-4.03 9-9 9c-2.12 0-4.07-.74-5.6-1.97"/><circle cx="6" cy="18" r="3"/></svg>
    Lasso
  </button>
  <button id="btn-gradient" title="Gradient Fill 30% (G)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3" opacity="0.3"/><path d="M3 12c0-4.97 4.03-9 9-9s9 4.03 9 9"/></svg>
    Shade
  </button>

  <div class="sep"></div>

  <div class="size-label" id="size-val">1</div>
  <input type="range" id="size-slider" min="1" max="5" value="1" step="1">

  <div class="sep"></div>

  <button id="btn-pressure" class="toggle-on" title="Pressure (T)">Pressure</button>
  <button id="btn-stabilize" class="toggle-on" title="Smooth (S)">Smooth</button>
  <button id="btn-symmetry" title="Mirror (M)">Mirror</button>

  <div class="sep"></div>

  <div id="swatches" style="display:flex;gap:3px;align-items:center;"></div>
  <label title="Custom color" style="position:relative;cursor:pointer;font-size:10px;color:#999;">
    +<input type="color" class="color-input" id="color-picker" value="#000000">
  </label>

  <div class="sep"></div>

  <button id="btn-undo" disabled title="Undo (Ctrl+Z)">Undo</button>
  <button id="btn-clear" title="Clear all">Clear</button>

  <div class="sep"></div>

  <button id="btn-png" title="Export PNG">PNG</button>
  <button id="btn-gltf" title="Export glTF">glTF</button>
  <button id="btn-timelapse" title="Export Timelapse MP4">TM</button>
</div>

<div class="status" id="status">strokes: 0</div>
<div class="pen-info" id="pen-info"></div>
<div class="toast" id="toast"></div>
<div id="eraser-cursor"></div>
<div id="symmetry-overlay"><svg><line id="sym-line" class="sym-line"/></svg></div>
<div class="sym-handle" id="sym-handle-a"></div>
<div class="sym-handle" id="sym-handle-b"></div>
<div id="export-overlay">
  <div class="ex-text" id="export-status">Exporting…</div>
  <div class="bar-track"><div class="bar-fill" id="export-progress"></div></div>
  <div class="ex-detail" id="export-detail"></div>
</div>
<div id="canvas-container"></div>

<script type="importmap">
{ "imports": { "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ─── CONFIG ───
const PALETTE = ['#000000','#ffffff','#808080','#e8a0a0','#a0c4e8','#a0e8b8','#e8dca0','#c8a0e8','#e8bfa0'];
const MAX_HISTORY = 15;
const MIN_PRESSURE_WIDTH = 0.1;

// ─── STATE ───
let currentColor = PALETTE[0];
let penSize = 1, brushSize = 6, eraserSize = 20;
let currentTool = 'pen'; // pen | brush | eraser | lasso | gradient
let isDrawing = false;
let pressureEnabled = true, smoothingEnabled = true;
let currentStrokeData = [];
let lassoPoints = [];
let strokes = [];
let undoStack = [];
let previewMesh = null, mirrorPreviewMesh = null, lassoPreviewLine = null;
let penDetected = false, eraserUndoSaved = false, isExporting = false;
let timelineEpoch = 0, currentStrokeStart = 0;

// Symmetry
let symmetryEnabled = false;
let symA = null, symB = null, draggingHandle = null;

function getActiveSize() {
  if (currentTool === 'pen') return penSize;
  if (currentTool === 'brush') return brushSize;
  if (currentTool === 'eraser') return eraserSize;
  return 1;
}

// ─── THREE SETUP ───
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0xffffff, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(
  -window.innerWidth/2, window.innerWidth/2, window.innerHeight/2, -window.innerHeight/2, 0.1, 100
);
camera.position.z = 10;
const drawPlane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ─── ERASER CURSOR ───
const eraserCursorEl = document.getElementById('eraser-cursor');
function updateEraserCursor(e) {
  if (currentTool === 'eraser') {
    eraserCursorEl.style.display = 'block';
    eraserCursorEl.style.width = eraserSize*2+'px'; eraserCursorEl.style.height = eraserSize*2+'px';
    eraserCursorEl.style.left = e.clientX+'px'; eraserCursorEl.style.top = e.clientY+'px';
  } else eraserCursorEl.style.display = 'none';
}

// ─── SYMMETRY ───
const symOverlay = document.getElementById('symmetry-overlay');
const symLineEl = document.getElementById('sym-line');
const symHandleA = document.getElementById('sym-handle-a');
const symHandleB = document.getElementById('sym-handle-b');

symA = new THREE.Vector3(0, window.innerHeight/2, 0);
symB = new THREE.Vector3(0, -window.innerHeight/2, 0);

function worldToScreen(p) {
  const v = p.clone().project(camera);
  return { x: (v.x*0.5+0.5)*window.innerWidth, y: (-v.y*0.5+0.5)*window.innerHeight };
}
function screenToWorld(sx, sy) {
  const v = new THREE.Vector3((sx/window.innerWidth)*2-1, -(sy/window.innerHeight)*2+1, 0).unproject(camera);
  v.z = 0; return v;
}
function reflectPoint(p, a, b) {
  const dx = b.x-a.x, dy = b.y-a.y, len2 = dx*dx+dy*dy;
  if (!len2) return p.clone();
  const nx = -dy, ny = dx, vx = p.x-a.x, vy = p.y-a.y;
  const dot = (vx*nx+vy*ny)/len2;
  return new THREE.Vector3(p.x-2*dot*nx, p.y-2*dot*ny, 0);
}
function mirrorStrokeData(data) { return data.map(d => ({ pos: reflectPoint(d.pos, symA, symB), pressure: d.pressure })); }
function mirrorPoints(pts) { return pts.map(p => reflectPoint(p, symA, symB)); }

function updateSymmetryOverlay() {
  if (!symmetryEnabled) { symOverlay.style.display='none'; symHandleA.style.display='none'; symHandleB.style.display='none'; return; }
  symOverlay.style.display='block'; symHandleA.style.display='block'; symHandleB.style.display='block';
  const sa = worldToScreen(symA), sb = worldToScreen(symB);
  symLineEl.setAttribute('x1',sa.x); symLineEl.setAttribute('y1',sa.y);
  symLineEl.setAttribute('x2',sb.x); symLineEl.setAttribute('y2',sb.y);
  symHandleA.style.left=sa.x+'px'; symHandleA.style.top=sa.y+'px';
  symHandleB.style.left=sb.x+'px'; symHandleB.style.top=sb.y+'px';
}

symHandleA.addEventListener('pointerdown', e => { e.stopPropagation(); draggingHandle='a'; symHandleA.setPointerCapture(e.pointerId); });
symHandleB.addEventListener('pointerdown', e => { e.stopPropagation(); draggingHandle='b'; symHandleB.setPointerCapture(e.pointerId); });
document.addEventListener('pointermove', e => {
  if (!draggingHandle) return;
  const wp = screenToWorld(e.clientX, e.clientY);
  if (draggingHandle==='a') symA.copy(wp); else symB.copy(wp);
  updateSymmetryOverlay();
});
document.addEventListener('pointerup', () => { draggingHandle = null; });

// ─── SMOOTHING ───
function smoothStrokeData(data) {
  if (!smoothingEnabled || data.length < 3) return data;
  let pts = data.map(d => ({ pos: d.pos.clone(), pressure: d.pressure }));
  for (let iter = 0; iter < 2; iter++) {
    const next = [pts[0]];
    for (let i = 0; i < pts.length-1; i++) {
      const p0=pts[i], p1=pts[i+1];
      next.push(
        { pos: new THREE.Vector3(p0.pos.x*0.75+p1.pos.x*0.25, p0.pos.y*0.75+p1.pos.y*0.25, 0), pressure: p0.pressure*0.75+p1.pressure*0.25 },
        { pos: new THREE.Vector3(p0.pos.x*0.25+p1.pos.x*0.75, p0.pos.y*0.25+p1.pos.y*0.75, 0), pressure: p0.pressure*0.25+p1.pressure*0.75 }
      );
    }
    next.push(pts[pts.length-1]); pts = next;
  }
  const W = 5;
  return pts.map((p,i) => {
    const s = Math.max(0, i-Math.floor(W/2)), e = Math.min(pts.length, i+Math.ceil(W/2));
    let sum=0; for (let j=s;j<e;j++) sum+=pts[j].pressure;
    return { pos: p.pos, pressure: sum/(e-s) };
  });
}

// ─── MESH BUILDING ───
function buildRibbonMesh(strokeData, baseWidth, color, opts={}) {
  if (strokeData.length < 2) return null;
  const smooth = smoothStrokeData(strokeData);
  const verts = [], indices = [], n = smooth.length;
  for (let i = 0; i < n; i++) {
    let dir;
    if (i===0) dir = new THREE.Vector2().subVectors(smooth[1].pos, smooth[0].pos);
    else if (i===n-1) dir = new THREE.Vector2().subVectors(smooth[n-1].pos, smooth[n-2].pos);
    else dir = new THREE.Vector2().subVectors(smooth[i+1].pos, smooth[i-1].pos);
    const len = dir.length(); if (len>0) dir.divideScalar(len); else dir.set(1,0);
    const perp = new THREE.Vector2(-dir.y, dir.x);
    const pf = pressureEnabled ? MIN_PRESSURE_WIDTH+(1-MIN_PRESSURE_WIDTH)*smooth[i].pressure : 1;
    const hw = (baseWidth*pf)/2;
    verts.push(smooth[i].pos.x+perp.x*hw, smooth[i].pos.y+perp.y*hw, 0, smooth[i].pos.x-perp.x*hw, smooth[i].pos.y-perp.y*hw, 0);
    if (i<n-1) { const bi=i*2; indices.push(bi,bi+1,bi+2, bi+1,bi+3,bi+2); }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts,3));
  geo.setIndex(indices); geo.computeVertexNormals();
  const transparent = !!(opts.transparent || opts.opacity < 1);
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: new THREE.Color(color), side: THREE.DoubleSide,
    transparent, opacity: opts.opacity !== undefined ? opts.opacity : 1
  }));
}

function buildDot(pos, size, pressure, color, opacity) {
  const pf = pressureEnabled ? MIN_PRESSURE_WIDTH+(1-MIN_PRESSURE_WIDTH)*pressure : 1;
  const geo = new THREE.CircleGeometry((size*pf)/2, 16);
  const transparent = opacity !== undefined && opacity < 1;
  const mat = new THREE.MeshBasicMaterial({ color: new THREE.Color(color), transparent, opacity: opacity||1 });
  const m = new THREE.Mesh(geo, mat); m.position.copy(pos); return m;
}

function buildStrokeMesh(strokeData, size, color, opacity) {
  const opts = opacity !== undefined ? { opacity, transparent: true } : {};
  if (strokeData.length < 2) return buildDot(strokeData[0].pos, size, strokeData[0].pressure, color, opacity);
  return buildRibbonMesh(strokeData, size, color, opts);
}

function buildLassoFill(points, color, opacity) {
  if (points.length < 3) return null;
  const shape = new THREE.Shape();
  shape.moveTo(points[0].x, points[0].y);
  for (let i=1;i<points.length;i++) shape.lineTo(points[i].x, points[i].y);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  const transparent = opacity !== undefined && opacity < 1;
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: new THREE.Color(color), side: THREE.DoubleSide,
    transparent: transparent || false, opacity: opacity !== undefined ? opacity : 1
  }));
}

// ─── LIVE PREVIEW ───
function clearPreviews() {
  [previewMesh, mirrorPreviewMesh, lassoPreviewLine].forEach(m => {
    if (m) { scene.remove(m); m.geometry?.dispose(); m.material?.dispose(); }
  });
  previewMesh = mirrorPreviewMesh = lassoPreviewLine = null;
}

function updateStrokePreview() {
  clearPreviews();
  if (currentStrokeData.length < 2) return;
  const size = getActiveSize();
  previewMesh = buildRibbonMesh(currentStrokeData, size, currentColor, { opacity: 0.6, transparent: true });
  if (previewMesh) scene.add(previewMesh);
  if (symmetryEnabled) {
    mirrorPreviewMesh = buildRibbonMesh(mirrorStrokeData(currentStrokeData), size, currentColor, { opacity: 0.6, transparent: true });
    if (mirrorPreviewMesh) scene.add(mirrorPreviewMesh);
  }
}

function updateLassoPreview(isGradient) {
  clearPreviews();
  if (lassoPoints.length < 2) return;
  const closed = [...lassoPoints, lassoPoints[0]];
  const data = closed.map(p => ({ pos: p.clone(), pressure: 0.5 }));
  lassoPreviewLine = buildRibbonMesh(data, 1.5, currentColor, { opacity: 0.35, transparent: true });
  if (lassoPreviewLine) scene.add(lassoPreviewLine);

  if (lassoPoints.length >= 3) {
    const previewOpacity = isGradient ? 0.1 : 0.15;
    previewMesh = buildLassoFill(lassoPoints, currentColor, previewOpacity);
    if (previewMesh) scene.add(previewMesh);
    if (symmetryEnabled) {
      mirrorPreviewMesh = buildLassoFill(mirrorPoints(lassoPoints), currentColor, previewOpacity);
      if (mirrorPreviewMesh) scene.add(mirrorPreviewMesh);
    }
  }
}

// ─── PARTIAL ERASER ───
function eraseAt(worldPos, radius) {
  let changed = false;
  for (let si = strokes.length-1; si >= 0; si--) {
    const s = strokes[si];
    let hasHit = false;
    for (const d of s.strokeData) { if (worldPos.distanceTo(d.pos) < radius) { hasHit=true; break; } }
    if (!hasHit) continue;
    changed = true;
    if (!eraserUndoSaved) { eraserUndoSaved = true; saveUndoState(); }
    scene.remove(s.mesh); s.mesh.geometry?.dispose(); s.mesh.material?.dispose();
    const segments = []; let seg = [];
    for (const d of s.strokeData) {
      if (worldPos.distanceTo(d.pos) < radius) { if (seg.length) segments.push(seg); seg = []; }
      else seg.push({ pos: d.pos.clone(), pressure: d.pressure });
    }
    if (seg.length) segments.push(seg);
    strokes.splice(si, 1);
    for (const sg of segments) {
      const mesh = buildStrokeMesh(sg, s.size, s.color, s.opacity);
      if (mesh) { scene.add(mesh); strokes.push({ mesh, strokeData: sg, color: s.color, size: s.size, opacity: s.opacity, isLasso: s.isLasso, drawStartAt: s.drawStartAt, createdAt: s.createdAt }); }
    }
  }
  if (changed) updateStatus();
}

// ─── UNDO ───
function saveUndoState() {
  undoStack.push(strokes.map(s => ({
    strokeData: s.strokeData.map(d => ({ pos: d.pos.clone(), pressure: d.pressure })),
    color: s.color, size: s.size, opacity: s.opacity, isLasso: !!s.isLasso,
    drawStartAt: s.drawStartAt||0, createdAt: s.createdAt||0
  })));
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  updateStatus();
}

function undo() {
  if (!undoStack.length) return;
  strokes.forEach(s => { scene.remove(s.mesh); s.mesh.geometry?.dispose(); s.mesh.material?.dispose(); });
  strokes = [];
  for (const d of undoStack.pop()) {
    let mesh;
    if (d.isLasso) mesh = buildLassoFill(d.strokeData.map(dd=>dd.pos), d.color, d.opacity);
    else mesh = buildStrokeMesh(d.strokeData, d.size, d.color, d.opacity);
    if (mesh) { scene.add(mesh); strokes.push({ mesh, strokeData: d.strokeData, color: d.color, size: d.size, opacity: d.opacity, isLasso: d.isLasso, drawStartAt: d.drawStartAt, createdAt: d.createdAt }); }
  }
  updateStatus();
}

// ─── INPUT HELPERS ───
function getWorldPos(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const t = new THREE.Vector3(); raycaster.ray.intersectPlane(drawPlane, t); return t;
}
function getPressure(e) {
  if (e.pointerType==='pen') { if (!penDetected) { penDetected=true; showToast('Pen tablet detected'); } return e.pressure; }
  return 0.5;
}
function updatePenInfo(e) {
  const el = document.getElementById('pen-info');
  if (e.pointerType==='pen') el.innerHTML = `<span class="detected">pen</span> p:${e.pressure.toFixed(2)} tilt:${e.tiltX||0}°,${e.tiltY||0}°`;
  else el.textContent = penDetected ? `pen ok | ${e.pointerType}` : '';
}
function addSample(e) {
  const pos = getWorldPos(e), pressure = getPressure(e);
  const last = currentStrokeData[currentStrokeData.length-1];
  if (last && pos.distanceTo(last.pos) < 1.5) return;
  currentStrokeData.push({ pos, pressure });
}

// ─── COMMIT HELPERS ───
function commitStroke(strokeData, color, size, opacity, isLasso) {
  const now = Date.now();
  let mesh;
  if (isLasso) mesh = buildLassoFill(strokeData.map(d=>d.pos), color, opacity);
  else mesh = buildStrokeMesh(strokeData, size, color, opacity);
  if (!mesh) return;
  scene.add(mesh);
  strokes.push({ mesh, strokeData, color, size, opacity, isLasso: !!isLasso, drawStartAt: currentStrokeStart, createdAt: now });

  if (symmetryEnabled) {
    let mirrorData, mirrorMesh;
    if (isLasso) {
      const mirPts = mirrorPoints(strokeData.map(d=>d.pos));
      mirrorData = mirPts.map(p => ({ pos: p, pressure: 0.5 }));
      mirrorMesh = buildLassoFill(mirPts, color, opacity);
    } else {
      mirrorData = mirrorStrokeData(strokeData);
      mirrorMesh = buildStrokeMesh(mirrorData, size, color, opacity);
    }
    if (mirrorMesh) { scene.add(mirrorMesh); strokes.push({ mesh: mirrorMesh, strokeData: mirrorData, color, size, opacity, isLasso: !!isLasso, drawStartAt: currentStrokeStart, createdAt: now }); }
  }
}

// ─── POINTER EVENTS ───
renderer.domElement.addEventListener('pointerdown', e => {
  if (e.button !== 0 || isExporting) return;
  if (penDetected && e.pointerType === 'touch') return;
  isDrawing = true;
  updatePenInfo(e); updateEraserCursor(e);
  currentStrokeStart = Date.now();
  if (!timelineEpoch) timelineEpoch = currentStrokeStart;
  const pos = getWorldPos(e);

  if (currentTool === 'eraser') { eraserUndoSaved = false; eraseAt(pos, eraserSize); return; }
  if (currentTool === 'lasso' || currentTool === 'gradient') { lassoPoints = [pos]; renderer.domElement.setPointerCapture(e.pointerId); return; }

  // pen or brush
  saveUndoState();
  currentStrokeData = [{ pos, pressure: getPressure(e) }];
  renderer.domElement.setPointerCapture(e.pointerId);
});

renderer.domElement.addEventListener('pointermove', e => {
  updatePenInfo(e); updateEraserCursor(e);
  if (penDetected && e.pointerType === 'touch') return;
  if (!isDrawing) return;

  if (currentTool === 'eraser') { eraseAt(getWorldPos(e), eraserSize); return; }
  if (currentTool === 'lasso' || currentTool === 'gradient') {
    const pos = getWorldPos(e), last = lassoPoints[lassoPoints.length-1];
    if (pos.distanceTo(last) >= 3) { lassoPoints.push(pos); updateLassoPreview(currentTool==='gradient'); }
    return;
  }

  if (e.getCoalescedEvents) { for (const ce of e.getCoalescedEvents()) addSample(ce); }
  else addSample(e);
  updateStrokePreview();
});

renderer.domElement.addEventListener('pointerup', e => {
  if (!isDrawing) return;
  if (penDetected && e.pointerType === 'touch') return;
  isDrawing = false; eraserUndoSaved = false;

  if (currentTool === 'eraser') return;

  clearPreviews();

  if (currentTool === 'lasso' || currentTool === 'gradient') {
    if (lassoPoints.length >= 3) {
      saveUndoState();
      const opacity = currentTool === 'gradient' ? 0.3 : 1;
      const data = lassoPoints.map(p => ({ pos: p.clone(), pressure: 0.5 }));
      commitStroke(data, currentColor, 0, opacity, true);
    }
    lassoPoints = [];
    updateStatus(); return;
  }

  // pen or brush
  if (!currentStrokeData.length) return;
  commitStroke([...currentStrokeData], currentColor, getActiveSize(), 1, false);
  currentStrokeData = [];
  updateStatus();
});

renderer.domElement.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
renderer.domElement.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
document.addEventListener('pointermove', e => updateEraserCursor(e));

// ─── KEYBOARD ───
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { e.preventDefault(); undo(); }
  if (e.key==='p') setTool('pen');
  if (e.key==='b') setTool('brush');
  if (e.key==='e') setTool('eraser');
  if (e.key==='l') setTool('lasso');
  if (e.key==='g') setTool('gradient');
  if (e.key==='`'||e.key==='~') setTool(currentTool==='eraser'?'pen':'eraser');
  if (e.key==='t') togglePressure();
  if (e.key==='s'&&!e.ctrlKey&&!e.metaKey) toggleSmoothing();
  if (e.key==='m') toggleSymmetry();
  if (e.key==='[') { adjustSize(-1); }
  if (e.key===']') { adjustSize(1); }
});

function adjustSize(delta) {
  if (currentTool==='pen') { penSize = Math.max(1, Math.min(5, penSize+delta)); }
  else if (currentTool==='brush') { brushSize = Math.max(1, Math.min(20, brushSize+delta)); }
  else if (currentTool==='eraser') { eraserSize = Math.max(2, Math.min(80, eraserSize+delta)); }
  syncSizeUI();
}

// ─── TOOLBAR ───
const swatchContainer = document.getElementById('swatches');
PALETTE.forEach(c => {
  const el = document.createElement('div');
  const isWhite = c === '#ffffff';
  el.className = 'color-swatch' + (c===currentColor?' active':'') + (isWhite?' white-swatch':'');
  el.style.background = c;
  el.addEventListener('click', () => {
    currentColor = c;
    document.getElementById('color-picker').value = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  });
  swatchContainer.appendChild(el);
});

document.getElementById('color-picker').addEventListener('input', e => {
  currentColor = e.target.value;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
});

const sizeSlider = document.getElementById('size-slider');
const sizeVal = document.getElementById('size-val');
sizeSlider.addEventListener('input', () => {
  const v = parseInt(sizeSlider.value);
  if (currentTool==='pen') penSize = v;
  else if (currentTool==='brush') brushSize = v;
  else if (currentTool==='eraser') eraserSize = v;
  sizeVal.textContent = v;
});

function syncSizeUI() {
  let min, max, val;
  if (currentTool==='pen') { min=1; max=5; val=penSize; }
  else if (currentTool==='brush') { min=1; max=20; val=brushSize; }
  else if (currentTool==='eraser') { min=2; max=80; val=eraserSize; }
  else { min=1; max=5; val=1; }
  sizeSlider.min = min; sizeSlider.max = max; sizeSlider.value = val; sizeVal.textContent = val;
}

function setTool(tool) {
  currentTool = tool;
  ['pen','brush','eraser','lasso','gradient'].forEach(t => document.getElementById('btn-'+t).classList.toggle('active', t===tool));
  renderer.domElement.style.cursor = tool==='eraser'?'none':'crosshair';
  eraserCursorEl.style.display = tool==='eraser'?'block':'none';
  syncSizeUI();
}

function togglePressure() { pressureEnabled=!pressureEnabled; document.getElementById('btn-pressure').classList.toggle('toggle-on', pressureEnabled); showToast(pressureEnabled?'Pressure ON':'Pressure OFF'); }
function toggleSmoothing() { smoothingEnabled=!smoothingEnabled; document.getElementById('btn-stabilize').classList.toggle('toggle-on', smoothingEnabled); showToast(smoothingEnabled?'Smoothing ON':'Smoothing OFF'); }
function toggleSymmetry() { symmetryEnabled=!symmetryEnabled; document.getElementById('btn-symmetry').classList.toggle('toggle-on', symmetryEnabled); updateSymmetryOverlay(); showToast(symmetryEnabled?'Mirror ON':'Mirror OFF'); }

document.getElementById('btn-pen').addEventListener('click', () => setTool('pen'));
document.getElementById('btn-brush').addEventListener('click', () => setTool('brush'));
document.getElementById('btn-eraser').addEventListener('click', () => setTool('eraser'));
document.getElementById('btn-lasso').addEventListener('click', () => setTool('lasso'));
document.getElementById('btn-gradient').addEventListener('click', () => setTool('gradient'));
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-pressure').addEventListener('click', togglePressure);
document.getElementById('btn-stabilize').addEventListener('click', toggleSmoothing);
document.getElementById('btn-symmetry').addEventListener('click', toggleSymmetry);

// ─── CLEAR (nuclear) ───
document.getElementById('btn-clear').addEventListener('click', () => {
  if (!strokes.length && !scene.children.length) return;
  saveUndoState();
  // Remove ALL objects from scene
  while (scene.children.length > 0) {
    const c = scene.children[0];
    scene.remove(c);
    c.geometry?.dispose();
    c.material?.dispose();
  }
  strokes = [];
  clearPreviews();
  updateStatus();
});

// ─── EXPORT PNG ───
document.getElementById('btn-png').addEventListener('click', () => {
  renderer.render(scene, camera);
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = 'nib-sketch.png'; a.click();
  showToast('PNG exported');
});

// ─── EXPORT GLTF ───
document.getElementById('btn-gltf').addEventListener('click', () => {
  if (!strokes.length) { showToast('Nothing to export'); return; }
  try {
    const gltf = { asset:{version:"2.0",generator:"NIB"}, scene:0, scenes:[{nodes:[]}], nodes:[], meshes:[], accessors:[], bufferViews:[], buffers:[], materials:[] };
    const allBuf = []; let byteOff = 0;
    for (const s of strokes) {
      const geo = s.mesh.geometry, posAttr = geo.getAttribute('position');
      if (!posAttr) continue;
      const posArr = new Float32Array(posAttr.array);
      let mnX=Infinity,mnY=Infinity,mnZ=Infinity,mxX=-Infinity,mxY=-Infinity,mxZ=-Infinity;
      for (let j=0;j<posArr.length;j+=3) { mnX=Math.min(mnX,posArr[j]);mnY=Math.min(mnY,posArr[j+1]);mnZ=Math.min(mnZ,posArr[j+2]);mxX=Math.max(mxX,posArr[j]);mxY=Math.max(mxY,posArr[j+1]);mxZ=Math.max(mxZ,posArr[j+2]); }
      const pBV = gltf.bufferViews.length;
      gltf.bufferViews.push({buffer:0,byteOffset:byteOff,byteLength:posArr.byteLength,target:34962});
      allBuf.push(new Uint8Array(posArr.buffer.slice(posArr.byteOffset,posArr.byteOffset+posArr.byteLength)));
      byteOff+=posArr.byteLength; const pp=(4-(posArr.byteLength%4))%4; if(pp){allBuf.push(new Uint8Array(pp));byteOff+=pp;}
      const pAcc = gltf.accessors.length;
      gltf.accessors.push({bufferView:pBV,componentType:5126,count:posAttr.count,type:"VEC3",max:[mxX,mxY,mxZ],min:[mnX,mnY,mnZ]});
      let iAcc; const idx = geo.getIndex();
      if (idx) {
        const u32=idx.array instanceof Uint32Array||posAttr.count>65535;
        const iArr=u32?new Uint32Array(idx.array):new Uint16Array(idx.array);
        const iBV=gltf.bufferViews.length;
        gltf.bufferViews.push({buffer:0,byteOffset:byteOff,byteLength:iArr.byteLength,target:34963});
        allBuf.push(new Uint8Array(iArr.buffer.slice(iArr.byteOffset,iArr.byteOffset+iArr.byteLength)));
        byteOff+=iArr.byteLength; const ip=(4-(iArr.byteLength%4))%4; if(ip){allBuf.push(new Uint8Array(ip));byteOff+=ip;}
        iAcc=gltf.accessors.length; gltf.accessors.push({bufferView:iBV,componentType:u32?5125:5123,count:idx.count,type:"SCALAR"});
      }
      const col=s.mesh.material.color, mIdx=gltf.materials.length;
      gltf.materials.push({pbrMetallicRoughness:{baseColorFactor:[col.r,col.g,col.b,1],metallicFactor:0,roughnessFactor:1},doubleSided:true});
      const mshIdx=gltf.meshes.length, prim={attributes:{POSITION:pAcc},material:mIdx};
      if(iAcc!==undefined) prim.indices=iAcc;
      gltf.meshes.push({primitives:[prim]});
      const node={mesh:mshIdx}, p=s.mesh.position;
      if(p.x||p.y||p.z) node.translation=[p.x,p.y,p.z];
      gltf.nodes.push(node); gltf.scenes[0].nodes.push(gltf.nodes.length-1);
    }
    const total=allBuf.reduce((s,a)=>s+a.length,0), combined=new Uint8Array(total);
    let o=0; for(const c of allBuf){combined.set(c,o);o+=c.length;}
    let bin=''; for(let i=0;i<combined.length;i++) bin+=String.fromCharCode(combined[i]);
    gltf.buffers.push({uri:`data:application/octet-stream;base64,${btoa(bin)}`,byteLength:total});
    const blob=new Blob([JSON.stringify(gltf)],{type:'application/json'});
    const url=URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='nib-sketch.gltf'; a.click(); URL.revokeObjectURL(url);
    showToast('glTF exported');
  } catch(err) { console.error(err); showToast('Export failed'); }
});

// ─── EXPORT TIMELAPSE ───
document.getElementById('btn-timelapse').addEventListener('click', () => {
  if (!strokes.length) { showToast('Nothing to record'); return; }
  if (isExporting) return;
  exportTimelapse();
});

async function exportTimelapse() {
  isExporting = true;
  const overlay = document.getElementById('export-overlay');
  const progressBar = document.getElementById('export-progress');
  const statusEl = document.getElementById('export-status');
  const detailEl = document.getElementById('export-detail');
  overlay.style.display = 'flex';
  document.querySelector('.toolbar').style.opacity = '0';
  document.querySelector('.toolbar').style.pointerEvents = 'none';
  symOverlay.style.display = 'none'; symHandleA.style.display = 'none'; symHandleB.style.display = 'none';

  const strokeList = strokes.map(s => ({
    strokeData: s.strokeData, color: s.color, size: s.size, opacity: s.opacity,
    isLasso: !!s.isLasso, drawStartAt: s.drawStartAt||0, createdAt: s.createdAt||0
  }));
  strokeList.sort((a,b) => a.createdAt - b.createdAt);

  // Collapse idle gaps
  const IDLE_THRESHOLD = 2000, GAP_TRANSITION = 200;
  const firstTime = strokeList[0].drawStartAt || strokeList[0].createdAt;
  let idleRemoved = 0;
  for (let i=1; i<strokeList.length; i++) {
    const gap = (strokeList[i].drawStartAt||strokeList[i].createdAt) - strokeList[i-1].createdAt;
    if (gap > IDLE_THRESHOLD) idleRemoved += gap - GAP_TRANSITION;
  }
  const rawDur = strokeList[strokeList.length-1].createdAt - firstTime;
  const compDur = Math.max(rawDur - idleRemoved, 2000);
  const SPEED = 12, FPS = 30;
  const playDur = Math.max(compDur / SPEED, 3000);
  const totalFrames = Math.ceil((playDur/1000) * FPS);

  statusEl.textContent = `Exporting (${(playDur/1000).toFixed(1)}s @ ${SPEED}x)`;
  detailEl.textContent = `${totalFrames} frames · ${((rawDur-compDur)/1000).toFixed(0)}s idle cut`;

  // Compute compressed timeline
  let accIdle = 0;
  const timeline = strokeList.map((s,i) => {
    if (i>0) { const gap = (s.drawStartAt||s.createdAt) - strokeList[i-1].createdAt; if (gap>IDLE_THRESHOLD) accIdle += gap-GAP_TRANSITION; }
    const ds = ((s.drawStartAt||s.createdAt) - firstTime - accIdle) / SPEED;
    const de = (s.createdAt - firstTime - accIdle) / SPEED;
    return { ...s, pStart: ds, pEnd: ds + Math.max(de-ds, 100) };
  });

  // Build export meshes (separate from scene meshes)
  const exportMeshes = timeline.map(ts => {
    if (ts.isLasso) return buildLassoFill(ts.strokeData.map(d=>d.pos), ts.color, ts.opacity);
    return buildStrokeMesh(ts.strokeData, ts.size, ts.color, ts.opacity);
  });

  // Hide real strokes
  const origVis = strokes.map(s => s.mesh.visible);
  strokes.forEach(s => { s.mesh.visible = false; });

  // Add export meshes (hidden)
  exportMeshes.forEach(m => { if(m) { m.visible = false; scene.add(m); } });

  // Canvas for even dimensions (H.264 requirement)
  const cW = renderer.domElement.width, cH = renderer.domElement.height;
  const exW = cW & ~1, exH = cH & ~1;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = exW; tempCanvas.height = exH;
  const tempCtx = tempCanvas.getContext('2d');

  let partialMesh = null;
  let success = false;

  // Try WebCodecs + mp4-muxer first, fallback to MediaRecorder
  if (typeof VideoEncoder !== 'undefined') {
    try {
      const { Muxer, ArrayBufferTarget } = await import('https://cdn.jsdelivr.net/npm/mp4-muxer@5/build/mp4-muxer.mjs');
      const target = new ArrayBufferTarget();
      const muxer = new Muxer({ target, video: { codec: 'avc', width: exW, height: exH }, fastStart: 'in-memory' });
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: err => console.error('Encode error:', err)
      });
      const config = { codec: 'avc1.42001f', width: exW, height: exH, bitrate: 2_000_000, framerate: FPS };
      const supported = await VideoEncoder.isConfigSupported(config);
      if (!supported.supported) throw new Error('H.264 not supported');
      encoder.configure(config);

      for (let frame = 0; frame <= totalFrames; frame++) {
        const t = (frame/totalFrames) * playDur;
        if (partialMesh) { scene.remove(partialMesh); partialMesh.geometry?.dispose(); partialMesh.material?.dispose(); partialMesh=null; }
        for (let i=0; i<timeline.length; i++) {
          const ts=timeline[i], m=exportMeshes[i]; if(!m) continue;
          if (t>=ts.pEnd) { m.visible=true; }
          else if (t>=ts.pStart) {
            m.visible=false;
            const prog=(t-ts.pStart)/(ts.pEnd-ts.pStart);
            const cnt=Math.max(2, Math.floor(ts.strokeData.length*prog));
            const partial=ts.strokeData.slice(0, cnt);
            if (ts.isLasso && partial.length>=3) partialMesh=buildLassoFill(partial.map(d=>d.pos), ts.color, ts.opacity);
            else if (!ts.isLasso) partialMesh=buildStrokeMesh(partial, ts.size, ts.color, ts.opacity);
            if (partialMesh) scene.add(partialMesh);
          } else { m.visible=false; }
        }
        renderer.render(scene, camera);
        tempCtx.drawImage(renderer.domElement, 0, 0, exW, exH);
        const vf = new VideoFrame(tempCanvas, { timestamp: frame * (1_000_000/FPS) });
        encoder.encode(vf, { keyFrame: frame%(FPS*2)===0 });
        vf.close();

        if (frame%10===0) { progressBar.style.width=((frame/totalFrames)*100)+'%'; await new Promise(r=>setTimeout(r,0)); }
        while (encoder.encodeQueueSize > 10) await new Promise(r=>setTimeout(r,1));
      }

      await encoder.flush(); encoder.close();
      muxer.finalize();
      const blob = new Blob([target.buffer], { type: 'video/mp4' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='nib-timelapse.mp4'; a.click();
      URL.revokeObjectURL(url);
      success = true;
    } catch(err) { console.warn('WebCodecs failed, trying MediaRecorder:', err); }
  }

  // Fallback: MediaRecorder
  if (!success) {
    try {
      let mime = 'video/webm;codecs=vp9';
      if (typeof MediaRecorder!=='undefined') {
        if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) mime='video/webm;codecs=vp9';
        else if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) mime='video/webm;codecs=vp8';
        else mime='video/webm';
      }
      const stream = renderer.domElement.captureStream(30);
      const recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 2_000_000 });
      const chunks = [];
      recorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
      const done = new Promise(res => { recorder.onstop = () => res(); });
      recorder.start();

      let fr = 0;
      await new Promise(resolve => {
        const iv = setInterval(() => {
          const t = (fr/totalFrames)*playDur;
          if (partialMesh) { scene.remove(partialMesh); partialMesh.geometry?.dispose(); partialMesh.material?.dispose(); partialMesh=null; }
          for (let i=0;i<timeline.length;i++) {
            const ts=timeline[i], m=exportMeshes[i]; if(!m) continue;
            if (t>=ts.pEnd) m.visible=true;
            else if (t>=ts.pStart) {
              m.visible=false;
              const prog=(t-ts.pStart)/(ts.pEnd-ts.pStart), cnt=Math.max(2,Math.floor(ts.strokeData.length*prog));
              const partial=ts.strokeData.slice(0,cnt);
              if (ts.isLasso&&partial.length>=3) partialMesh=buildLassoFill(partial.map(d=>d.pos),ts.color,ts.opacity);
              else if(!ts.isLasso) partialMesh=buildStrokeMesh(partial,ts.size,ts.color,ts.opacity);
              if(partialMesh) scene.add(partialMesh);
            } else m.visible=false;
          }
          renderer.render(scene, camera);
          progressBar.style.width=((fr/totalFrames)*100)+'%';
          fr++;
          if (fr>totalFrames) { clearInterval(iv); recorder.stop(); resolve(); }
        }, 1000/FPS);
      });

      await done;
      const blob = new Blob(chunks, { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href=url; a.download='nib-timelapse.webm'; a.click();
      URL.revokeObjectURL(url);
      showToast('Exported as .webm (fallback)');
      success = true;
    } catch(err) { console.error('MediaRecorder also failed:', err); showToast('Export failed'); }
  }

  // Cleanup
  if (partialMesh) { scene.remove(partialMesh); partialMesh.geometry?.dispose(); partialMesh.material?.dispose(); }
  exportMeshes.forEach(m => { if(m) { scene.remove(m); m.geometry?.dispose(); m.material?.dispose(); } });
  strokes.forEach((s,i) => { s.mesh.visible = origVis[i]; });
  renderer.render(scene, camera);

  overlay.style.display = 'none';
  document.querySelector('.toolbar').style.opacity = '1';
  document.querySelector('.toolbar').style.pointerEvents = 'auto';
  if (symmetryEnabled) updateSymmetryOverlay();
  isExporting = false;
  if (success && !document.querySelector('.toast.show')) showToast('Timelapse exported as MP4');
}

// ─── UTILS ───
function updateStatus() {
  document.getElementById('status').textContent = `strokes: ${strokes.length} | history: ${undoStack.length}/${MAX_HISTORY}`;
  document.getElementById('btn-undo').disabled = !undoStack.length;
}
function showToast(msg) {
  const el = document.getElementById('toast'); el.textContent = msg;
  el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000);
}

// ─── RESIZE ───
window.addEventListener('resize', () => {
  const w=window.innerWidth, h=window.innerHeight;
  renderer.setSize(w,h);
  camera.left=-w/2; camera.right=w/2; camera.top=h/2; camera.bottom=-h/2;
  camera.updateProjectionMatrix();
  updateSymmetryOverlay();
});

// ─── RENDER ───
(function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); })();
updateStatus(); syncSizeUI();
</script>
